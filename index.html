<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぴったりおふとん｜ワンアク堂</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');
  :root {
    --bg:#1a1a2e; --room:#2d2b55; --wall:#3d3b6e;
    --accent:#ff6b9d; --accent2:#ffd93d; --accent3:#6bcb77;
    --text:#f5f0ff; --dim:#a89cc8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Zen Maru Gothic',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none;touch-action:manipulation;}
  .screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:480px;padding:20px;animation:fadeIn .4s ease;}
  .screen.active{display:flex;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .title-logo{font-size:13px;color:var(--dim);letter-spacing:4px;margin-bottom:8px;}
  .title-main{font-size:40px;font-weight:900;color:var(--text);text-align:center;line-height:1.2;margin-bottom:6px;}
  .title-emoji{font-size:60px;margin:16px 0;animation:float 3s ease-in-out infinite;}
  .title-sub{font-size:14px;color:var(--dim);text-align:center;margin-bottom:28px;line-height:1.9;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:15px 44px;font-size:19px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;transition:transform .1s,box-shadow .1s;box-shadow:0 4px 0 #c44d7a;letter-spacing:2px;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #c44d7a;}
  .btn-sub{background:var(--wall);box-shadow:0 4px 0 #2a2850;font-size:15px;padding:11px 32px;margin-top:10px;}
  .btn-sub:active{box-shadow:0 1px 0 #2a2850;}
  .stage-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:20px;letter-spacing:2px;}
  .stage-list{width:100%;display:flex;flex-direction:column;gap:10px;}
  .stage-card{background:var(--room);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .1s;}
  .stage-card:hover{border-color:var(--accent);transform:translateX(4px);}
  .stage-card.locked{opacity:.4;cursor:not-allowed;}
  .stage-card.locked:hover{transform:none;border-color:transparent;}
  .s-icon{font-size:32px;} .s-info{flex:1;} .s-name{font-size:17px;font-weight:700;color:var(--text);}
  .s-desc{font-size:12px;color:var(--dim);margin-top:2px;} .s-diff{font-size:11px;color:var(--accent2);font-weight:700;letter-spacing:1px;margin-top:2px;} .s-stars{font-size:17px;}
  .game-header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin-bottom:6px;}
  .stage-label{font-size:12px;color:var(--dim);font-weight:700;letter-spacing:2px;}
  .layer-indicator{display:flex;gap:6px;align-items:center;}
  .layer-dot{width:10px;height:10px;border-radius:50%;background:var(--wall);transition:background .3s;}
  .layer-dot.active{background:var(--accent2);}
  .layer-dot.done{background:var(--accent3);}
  .btn-back{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 8px;}
  .game-area{width:100%;max-width:480px;position:relative;cursor:pointer;}
  canvas{width:100%;display:block;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
  .tap-hint{text-align:center;color:var(--dim);font-size:13px;margin-top:10px;animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .layer-label{text-align:center;color:var(--text);font-size:14px;font-weight:700;margin-top:8px;min-height:20px;}
  .result-overlay{position:fixed;inset:0;background:rgba(10,10,30,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;animation:fadeIn .3s ease;}
  .result-overlay.active{display:flex;}
  .result-box{background:var(--room);border-radius:22px;padding:32px 44px;text-align:center;max-width:310px;width:90%;border:2px solid var(--wall);}
  .r-emoji{font-size:58px;margin-bottom:6px;} .r-label{font-size:26px;font-weight:900;color:var(--text);margin-bottom:6px;}
  .r-score{font-size:50px;font-weight:900;color:var(--accent2);margin-bottom:2px;} .r-unit{font-size:13px;color:var(--dim);margin-bottom:6px;}
  .r-detail{font-size:14px;color:var(--text);margin-bottom:14px;line-height:1.9;}
  .r-stars{font-size:28px;margin-bottom:20px;} .r-btns{display:flex;flex-direction:column;gap:8px;}
  .final-emoji{font-size:68px;margin:14px 0;animation:float 3s ease-in-out infinite;}
  .final-title{font-size:26px;font-weight:900;color:var(--text);margin-bottom:6px;text-align:center;}
  .final-total{font-size:54px;font-weight:900;color:var(--accent2);}
  .final-label{font-size:15px;color:var(--dim);margin-bottom:6px;} .final-max{font-size:13px;color:var(--dim);margin-bottom:20px;}
  .final-stages{width:100%;display:flex;gap:6px;margin-bottom:24px;justify-content:center;}
  .fss{background:var(--wall);border-radius:10px;padding:8px 10px;text-align:center;flex:1;}
  .fss-icon{font-size:18px;} .fss-score{font-size:17px;font-weight:700;color:var(--accent2);} .fss-name{font-size:9px;color:var(--dim);}
  .sparkle{position:fixed;pointer-events:none;font-size:22px;animation:sparkleAnim .8s ease forwards;z-index:200;}
  @keyframes sparkleAnim{0%{opacity:1;transform:scale(.5) translateY(0)}100%{opacity:0;transform:scale(1.5) translateY(-60px)}}
</style>
</head>
<body>

<div id="screen-title" class="screen active">
  <div class="title-logo">ワンアク堂</div>
  <div class="title-main">ぴったり<br>おふとん</div>
  <div class="title-emoji">🛏️</div>
  <div class="title-sub">布団を3枚、順番に重ねてかけよう。<br>タップした瞬間に落ちる。<br>ぴったり重ねるほど高得点！</div>
  <button class="btn" onclick="showScreen('screen-stages')">はじめる</button>
</div>

<div id="screen-stages" class="screen">
  <div class="stage-title">ステージえらび</div>
  <div class="stage-list" id="stage-list"></div>
  <button class="btn btn-sub" onclick="showScreen('screen-title')" style="margin-top:18px">← もどる</button>
</div>

<div id="screen-game" class="screen" style="padding:0;">
  <div class="game-header">
    <button class="btn-back" onclick="confirmBack()">✕</button>
    <div class="stage-label" id="game-stage-label">STAGE 1</div>
    <div class="layer-indicator">
      <div class="layer-dot" id="dot0"></div>
      <div class="layer-dot" id="dot1"></div>
      <div class="layer-dot" id="dot2"></div>
    </div>
  </div>
  <div class="game-area" id="game-area">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div class="layer-label" id="layer-label">タオルケットを落とそう</div>
  <div class="tap-hint" id="tap-hint">タップして落とす！</div>
</div>

<div id="result-overlay" class="result-overlay">
  <div class="result-box">
    <div class="r-emoji" id="r-emoji">🌟</div>
    <div class="r-label" id="r-label">ぴったり！</div>
    <div class="r-score" id="r-score">100</div>
    <div class="r-unit" id="r-unit">点</div>
    <div class="r-detail" id="r-detail"></div>
    <div class="r-stars" id="r-stars">⭐⭐⭐</div>
    <div class="r-btns">
      <button class="btn" id="r-next-btn" onclick="nextStage()">つぎへ →</button>
      <button class="btn btn-sub" id="r-sub-btn" onclick="retryStage()">もう一回</button>
    </div>
  </div>
</div>

<div id="screen-final" class="screen">
  <div class="final-emoji">🎉</div>
  <div class="final-title">全ステージクリア！</div>
  <div class="final-total" id="final-total">0</div>
  <div class="final-label">合計スコア</div>
  <div class="final-max">400点満点</div>
  <div class="final-stages" id="final-stages"></div>
  <button class="btn" onclick="startEndless()">エンドレスモードへ 🌙</button>
  <button class="btn btn-sub" onclick="resetGame()">もう一度あそぶ</button>
</div>

<div id="screen-endless" class="screen" style="padding:0;">
  <div class="game-header">
    <button class="btn-back" onclick="confirmBack()">✕</button>
    <div class="stage-label">∞ エンドレス</div>
    <div id="endless-count-display" style="font-size:18px;font-weight:900;color:var(--accent2);">0枚</div>
  </div>
  <div class="game-area" id="game-area-endless">
    <canvas id="gameCanvasEndless"></canvas>
  </div>
  <div class="layer-label" id="elayer-label"></div>
  <div class="tap-hint" id="etap-hint">タップして落とす！</div>
</div>

<script>
// ===== STAGE DATA =====
const STAGES = [
  { id:1, name:'大人', icon:'🧑', difficulty:'★★☆☆',
    char:'adult', scale:1.0, slideSpeed:4.0,
    personColor:'#f5cba7', hairColor:'#4a3728', pillow:'#e8e0ff' },
  { id:2, name:'子ども', icon:'🧒', difficulty:'★★★☆',
    char:'child', scale:0.75, slideSpeed:5.5,
    personColor:'#fdd5a8', hairColor:'#2c1810', pillow:'#fff0f5' },
  { id:3, name:'赤ちゃん', icon:'👶', difficulty:'★★★★',
    char:'baby', scale:0.58, slideSpeed:7.5,
    personColor:'#fde8c8', hairColor:'#3d2b1f', pillow:'#f0fff0' },
  { id:4, name:'どうぶつ', icon:'🐱', difficulty:'★★★★★',
    char:'cat', scale:0.50, slideSpeed:9.5,
    personColor:'#f5a623', hairColor:'#8b5e3c', pillow:'#fffacd' }
];

// 3 layers per stage
const LAYERS = [
  { name:'タオルケット', color:'#e8f8e8', pattern:'#a8e6a8', shadow:'#7acc7a',
    landAlpha:0.55, fallType:'feather', thickness:0.13, visual:'towel' },
  { name:'毛布',       color:'#ffd6e7', pattern:'#ffb3d1', shadow:'#ff8fb3',
    landAlpha:0.65, fallType:'medium', thickness:0.20, visual:'blanket' },
  { name:'掛け布団',   color:'#b8d4f0', pattern:'#90bce0', shadow:'#6a9cc0',
    landAlpha:0.80, fallType:'heavy',  thickness:0.28, visual:'duvet' }
];

let state = {
  currentStage:0, scores:[null,null,null,null],
  mode:'normal', endlessScore:0,
  endlessBest:parseInt(localStorage.getItem('endless_best')||'0'),
  endlessCountBest:parseInt(localStorage.getItem('endless_count_best')||'0'),
  unlockedStages:parseInt(localStorage.getItem('unlocked')||'1'),
  allCleared:localStorage.getItem('all_cleared')==='1'
};

// Game vars
let canvas, ctx, animFrame;
let currentStageData = null;
let currentLayerIdx = 0;
let landedLayers = []; // {x, y, width, height, layerDef, alpha}
let futon = {};
let gamePhase = 'sliding';
let slideDir = 1;
let fallTime = 0;
let layerScores = [];
let dotPrefix = '';
// Endless-specific
let endlessCount = 0;
let endlessStackHeight = 0; // total pixel height of stacked futons
// Face hit animation
let faceHitPhase = 0; // 0=none, 1=animating
let faceHitTimer = 0;
let screenShakeX = 0;
let screenShakeY = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id==='screen-stages') buildStageList();
}

function buildStageList() {
  const el = document.getElementById('stage-list');
  el.innerHTML = '';
  STAGES.forEach((s,i)=>{
    const unlocked = i < state.unlockedStages || state.allCleared;
    const sc = state.scores[i];
    const stars = sc !== null ? getStars(sc) : (unlocked ? '—' : '🔒');
    const card = document.createElement('div');
    card.className = 'stage-card'+(unlocked?'':' locked');
    card.innerHTML = `<div class="s-icon">${s.icon}</div>
      <div class="s-info"><div class="s-name">Stage ${s.id}：${s.name}</div>
      <div class="s-desc">布団3枚・${s.difficulty.length}段階の難しさ</div>
      <div class="s-diff">${s.difficulty}</div></div>
      <div class="s-stars">${stars}</div>`;
    if (unlocked) card.onclick = ()=>startStage(i);
    el.appendChild(card);
  });
  if (state.allCleared) {
    const ec = document.createElement('div');
    ec.className = 'stage-card';
    ec.innerHTML = `<div class="s-icon">🌙</div>
      <div class="s-info"><div class="s-name">エンドレスモード</div>
      <div class="s-desc">ランダムで無限に続く</div>
      <div class="s-diff">ベスト：${state.endlessBest}点</div></div>
      <div class="s-stars">∞</div>`;
    ec.onclick = startEndless;
    el.appendChild(ec);
  }
}

function getStars(s) {
  if (s>=90) return '⭐⭐⭐';
  if (s>=70) return '⭐⭐';
  if (s>=1)  return '⭐';
  return '💤';
}

function startStage(idx) {
  state.currentStage = idx;
  state.mode = 'normal';
  currentStageData = STAGES[idx];
  currentLayerIdx = 0;
  landedLayers = [];
  layerScores = [];
  dotPrefix = '';
  showScreen('screen-game');
  document.getElementById('game-stage-label').textContent = `STAGE ${idx+1}`;
  updateDots();
  updateLayerLabel();
  initGame('gameCanvas','game-area');
}

function updateDots() {
  const prefix = dotPrefix || '';
  for (let i=0;i<3;i++) {
    const el = document.getElementById(prefix+'dot'+i);
    if (!el) continue;
    el.className = 'layer-dot';
    if (i < currentLayerIdx) el.classList.add('done');
    else if (i === currentLayerIdx) el.classList.add('active');
  }
}

function updateLayerLabel() {
  const labelId = dotPrefix === 'e' ? 'elayer-label' : 'layer-label';
  const el = document.getElementById(labelId);
  if (el && currentLayerIdx < LAYERS.length) {
    el.textContent = LAYERS[currentLayerIdx].name + 'を落とそう';
  }
}

function initGame(canvasId, areaId) {
  if (animFrame) cancelAnimationFrame(animFrame);
  canvas = document.getElementById(canvasId);
  ctx = canvas.getContext('2d');
  const area = document.getElementById(areaId);
  const W = area.offsetWidth;
  const H = Math.round(W * 1.0);
  canvas.width = W;
  canvas.height = H;

  resetFuton(W, H);
  gamePhase = 'sliding';
  slideDir = 1;
  fallTime = 0;
  faceHitPhase = 0;
  faceHitTimer = 0;
  screenShakeX = 0;
  screenShakeY = 0;

  canvas.onclick = handleTap;
  canvas.ontouchstart = (e)=>{e.preventDefault();handleTap();};

  const hintId = dotPrefix==='e'?'etap-hint':'tap-hint';
  document.getElementById(hintId).style.display = 'block';

  loop();
}

function resetFuton(W, H) {
  const stg = currentStageData;
  const layer = LAYERS[currentLayerIdx];
  const sc = stg.scale;
  futon.width  = W * 0.42 * sc;
  futon.height = futon.width * layer.thickness;
  futon.x = W * 0.05;
  futon.y = H * 0.06; // always same start - physics unchanged
  futon.vy = 0;
  futon.angle = 0;
}

function handleTap() {
  if (gamePhase === 'sliding') {
    gamePhase = 'falling';
    futon.vy = 1.5;
    fallTime = 0;
    const hintId = dotPrefix==='e'?'etap-hint':'tap-hint';
    document.getElementById(hintId).style.display = 'none';
  }
}

function loop() {
  const W = canvas.width, H = canvas.height;
  const stg = currentStageData;
  const layer = LAYERS[currentLayerIdx];

  if (gamePhase === 'sliding') {
    futon.x += stg.slideSpeed * slideDir;
    const maxX = W - futon.width - W*0.05;
    const minX = W*0.05;
    if (futon.x >= maxX){futon.x=maxX; slideDir=-1;}
    if (futon.x <= minX){futon.x=minX; slideDir= 1;}
    futon.angle = slideDir * 0.03;
  }

  if (gamePhase === 'falling') {
    fallTime += 0.06;
    if (layer.fallType === 'feather') {
      futon.vy += 0.09; if (futon.vy>3.5) futon.vy=3.5;
      futon.x += Math.sin(fallTime*1.5)*2.8;
      futon.angle = Math.sin(fallTime*1.5)*0.18;
    } else if (layer.fallType === 'medium') {
      futon.vy += 0.28; if (futon.vy>9) futon.vy=9;
      futon.x += Math.sin(fallTime*2.2)*1.2;
      futon.angle = Math.sin(fallTime*2.2)*0.07;
    } else {
      futon.vy += 0.52; if (futon.vy>18) futon.vy=18;
      futon.angle *= 0.92;
    }
    futon.y += futon.vy;
    const landingY = state.mode==='endless' ? getLandingY(H) : getBedTop(H);
    if (futon.y + futon.height >= landingY) {
      futon.y = landingY - futon.height;
      futon.vy = 0; futon.angle = 0;
      gamePhase = 'landed';
      onLayerLanded(W, H);
    }
  }

  // Face hit animation
  if (gamePhase === 'facehit') {
    faceHitTimer++;
    // Screen shake: sharp at first, fades out
    if (faceHitTimer < 20) {
      screenShakeX = (Math.random()-0.5) * Math.max(0, 14 - faceHitTimer*0.7);
      screenShakeY = (Math.random()-0.5) * Math.max(0, 10 - faceHitTimer*0.5);
    } else {
      screenShakeX = 0;
      screenShakeY = 0;
    }
    if (faceHitTimer >= 80) {
      gamePhase = 'result';
      cancelAnimationFrame(animFrame);
      showEndlessGameOver();
      return;
    }
  }

  // Apply screen shake
  if (screenShakeX !== 0 || screenShakeY !== 0) {
    ctx.save();
    ctx.translate(screenShakeX, screenShakeY);
  }

  drawScene(W, H);

  if (screenShakeX !== 0 || screenShakeY !== 0) {
    ctx.restore();
  }

  if (gamePhase !== 'result') animFrame = requestAnimationFrame(loop);
}

function getBedTop(H) {
  return H * 0.50;
}

function getLandingY(H) {
  return getBedTop(H); // always fixed - visual stacking only
}

function getPersonBounds(W, H) {
  const sc = currentStageData.scale;
  const bedTop = getBedTop(H);
  const bodyW = W * 0.52 * sc;
  const bodyX = W*0.5 - bodyW*0.5;
  const headX = bodyX + bodyW*0.88;
  const feetX = bodyX;
  return {bodyX, bodyW, headX, feetX, bedTop};
}

function onLayerLanded(W, H) {
  const layer = LAYERS[currentLayerIdx % LAYERS.length];
  const pb = getPersonBounds(W, H);

  // Face hit check
  const faceFail = (futon.x + futon.width) > pb.headX + W*0.02;

  // Score this layer
  let sc = 0;
  if (!faceFail) {
    const idealCenter = pb.feetX + (pb.headX - pb.feetX)*0.42;
    const futonCenter = futon.x + futon.width*0.5;
    const dist = Math.abs(futonCenter - idealCenter);
    const maxDist = futon.width * 0.5;
    const ratio = Math.max(0, 1 - dist/maxDist);
    const feetExp = Math.max(0, pb.feetX - futon.x);
    const penalty = Math.min(25, (feetExp/futon.width)*70);
    sc = Math.round(Math.max(0, ratio*100 - penalty));
  }
  layerScores.push({score:sc, faceFail, name:layer.name});

  // Save landed layer (semi-transparent, fading older layers more)
  const alphaFade = state.mode==='endless' ? Math.max(0.25, layer.landAlpha - landedLayers.length*0.04) : layer.landAlpha;
  landedLayers.push({
    x:futon.x, y:futon.y,
    width:futon.width, height:futon.height,
    layerDef:layer, alpha:alphaFade
  });

  // === ENDLESS MODE ===
  if (state.mode==='endless') {
    if (faceFail) {
      // Start face-hit animation
      gamePhase = 'facehit';
      faceHitPhase = 1;
      faceHitTimer = 0;
      screenShakeX = 0;
      screenShakeY = 0;
      return;
    }
    // Low score = missed body = instant game over
    if (sc < 20) {
      gamePhase = 'result';
      cancelAnimationFrame(animFrame);
      setTimeout(()=>showEndlessGameOver('miss'), 300);
      return;
    }
    // Count up, clear previous layers (no stacking in endless)
    endlessCount++;
    endlessStackHeight = 0;
    landedLayers = []; // clear so screen stays clean
    // Update display
    const cd=document.getElementById('endless-count-display');
    if(cd) cd.textContent=endlessCount+'枚';
    // Sparkle every 5 layers
    if(endlessCount%5===0) for(let i=0;i<4;i++) setTimeout(spawnSparkle,i*80);
    // Random stage (character) and random layer (futon type) each time
    const randomStage = STAGES[Math.floor(Math.random() * STAGES.length)];
    const speedBoost = Math.min(endlessCount * 0.25, 7);
    currentStageData = Object.assign({}, randomStage, {
      slideSpeed: randomStage.slideSpeed + speedBoost
    });
    currentLayerIdx = Math.floor(Math.random() * LAYERS.length);
    // Next futon
    setTimeout(()=>{
      resetFuton(W, H);
      gamePhase='sliding';
      slideDir=Math.random()<0.5?1:-1;
      fallTime=0;
      document.getElementById('etap-hint').style.display='block';
    }, 350);
    return;
  }

  // === NORMAL MODE ===
  currentLayerIdx++;
  updateDots();
  if (currentLayerIdx >= LAYERS.length) {
    setTimeout(()=>showLayerResult(W, H), 600);
  } else {
    updateLayerLabel();
    setTimeout(()=>{
      resetFuton(W, H);
      gamePhase='sliding';
      slideDir=Math.random()<0.5?1:-1;
      fallTime=0;
      const hintId=dotPrefix==='e'?'etap-hint':'tap-hint';
      document.getElementById(hintId).style.display='block';
    }, 400);
  }
}

function showEndlessGameOver(reason) {
  const count = endlessCount;
  if (count > state.endlessCountBest) {
    state.endlessCountBest = count;
    localStorage.setItem('endless_count_best', count);
  }

  let emoji = '😅';
  let label = '失敗…';
  let detail = '';

  if (reason === 'miss') {
    emoji = '👣';
    detail = 'はみ出しすぎ！';
  } else {
    emoji = '😱';
    detail = '顔に当たった！';
  }

  if (count >= 20) { emoji = '🏆'; label = 'ゲームオーバー'; detail = 'すごい記録！'; }
  else if (count >= 12) { emoji = '🌟'; label = 'ゲームオーバー'; detail = '上手い！'; }
  else if (count >= 7)  { emoji = '😊'; label = 'ゲームオーバー'; detail = 'いい感じ！'; }

  const best = state.endlessCountBest;

  document.getElementById('r-emoji').textContent  = emoji;
  document.getElementById('r-label').textContent  = label;
  document.getElementById('r-score').textContent  = String(count);
  document.getElementById('r-unit').textContent   = '枚';
  document.getElementById('r-detail').textContent = detail + '　ベスト：' + best + '枚';
  document.getElementById('r-stars').textContent  = count >= 15 ? '⭐⭐⭐' : count >= 8 ? '⭐⭐' : count >= 3 ? '⭐' : '💤';

  const nb = document.getElementById('r-next-btn');
  nb.textContent = 'もう一回！';
  nb.onclick = function() {
    document.getElementById('result-overlay').classList.remove('active');
    startEndless();
  };

  const sb = document.getElementById('r-sub-btn');
  sb.textContent = 'ステージえらびへ';
  sb.onclick = function() {
    document.getElementById('result-overlay').classList.remove('active');
    showScreen('screen-stages');
  };

  document.getElementById('result-overlay').classList.add('active');
}

function showLayerResult(W, H) {
  gamePhase = 'result';
  cancelAnimationFrame(animFrame);
  screenShakeX = 0; screenShakeY = 0;

  const total = Math.round(layerScores.reduce((a,b)=>a+b.score,0)/3);
  const faceHits = layerScores.filter(l=>l.faceFail).length;

  let finalScore = total;
  if (faceHits > 0) finalScore = Math.max(0, finalScore - faceHits*20);

  // Save
  if (state.mode==='normal') {
    if (state.scores[state.currentStage]===null || finalScore>state.scores[state.currentStage]) {
      state.scores[state.currentStage]=finalScore;
    }
  } else {
    state.endlessScore += finalScore;
    document.getElementById('endless-score-display') && (document.getElementById('endless-score-display').textContent=state.endlessScore);
    if (state.endlessScore>state.endlessBest) {
      state.endlessBest=state.endlessScore;
      localStorage.setItem('endless_best',state.endlessBest);
    }
  }

  let emoji,label;
  if (finalScore>=90){emoji='🌟';label='ぴったり！';}
  else if (finalScore>=75){emoji='😊';label='いい感じ！';}
  else if (finalScore>=50){emoji='🙂';label='もう少し！';}
  else {emoji='😅';label='ずれちゃった…';}
  if (faceHits===3){emoji='😱';label='全部顔に！';}
  else if (faceHits>0){emoji='😬';label=`${faceHits}枚、顔に当たった！`;}

  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-label').textContent=label;
  document.getElementById('r-score').textContent=finalScore;
  document.getElementById('r-stars').textContent=getStars(finalScore);

  const detail = layerScores.map(l=>`${l.name}：${l.faceFail?'顔に当たった！':l.score+'点'}`).join('\n');
  document.getElementById('r-detail').innerHTML=detail.replace(/\n/g,'<br>');

  if (finalScore>=85) for(let i=0;i<7;i++) setTimeout(spawnSparkle,i*100);

  const nb = document.getElementById('r-next-btn');
  nb.onclick = nextStage; // 常にnextStageにリセット
  const sb = document.getElementById('r-sub-btn');
  sb.textContent = 'もう一回';
  sb.onclick = retryStage;
  if (state.mode==='endless') nb.textContent='つぎへ →';
  else if (state.currentStage>=STAGES.length-1) nb.textContent='結果を見る 🎉';
  else nb.textContent='つぎのステージへ →';

  document.getElementById('result-overlay').classList.add('active');
}

// ===== DRAW =====
function drawScene(W, H) {
  const stg = currentStageData;

  // Wall
  const wg=ctx.createLinearGradient(0,0,0,H*.50);
  wg.addColorStop(0,'#2a2860'); wg.addColorStop(1,'#1e1c4a');
  ctx.fillStyle=wg; ctx.fillRect(0,0,W,H*.50);

  // Floor
  const fg=ctx.createLinearGradient(0,H*.50,0,H);
  fg.addColorStop(0,'#3a2e22'); fg.addColorStop(1,'#221a12');
  ctx.fillStyle=fg; ctx.fillRect(0,H*.50,W,H*.50);

  // Stars & moon
  ctx.fillStyle='rgba(255,255,200,.55)';
  [[.08,.05],[.25,.13],[.65,.04],[.83,.17],[.50,.09],[.92,.06],[.40,.19]].forEach(([x,y])=>{
    ctx.beginPath();ctx.arc(W*x,H*y,1.4,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='#ffe8a0';ctx.beginPath();ctx.arc(W*.87,H*.09,W*.048,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2a2860';ctx.beginPath();ctx.arc(W*.89,H*.075,W*.038,0,Math.PI*2);ctx.fill();

  const bedTop=getBedTop(H);
  const pb=getPersonBounds(W,H);
  const bedH=H-bedTop;
  const pad=W*.05;

  // Bed legs
  ctx.fillStyle='#5a3820';
  [[pad+8,bedTop+bedH*.78],[W-pad-18,bedTop+bedH*.78]].forEach(([x,y])=>{ctx.fillRect(x,y,10,bedH*.18);});

  // Bed frame
  rr(ctx,pad,bedTop,W-pad*2,bedH*.80,10,'#6b4226');
  rr(ctx,W-pad-W*.09,bedTop-bedH*.25,W*.09,bedH*.32,8,'#7a4e30');
  // Mattress
  rr(ctx,pad+6,bedTop+bedH*.13,W-pad*2-12,bedH*.50,8,'#ede0ff');

  // Pillow
  const sc=stg.scale;
  const pw=W*.13*sc, px=pb.headX-pw*.5, py=bedTop+bedH*.09;
  rr(ctx,px,py,pw,H*.082,6,stg.pillow);
  ctx.strokeStyle='rgba(200,180,220,.4)';ctx.lineWidth=1;
  rr(ctx,px+3,py+3,pw-6,H*.082-6,4,null,true);

  // Person
  drawPerson(ctx,W,H,stg,pb,bedTop,bedH);

  // Landed layers (semi-transparent, slight visual depth offset)
  landedLayers.forEach((l, i)=>{
    ctx.save();
    ctx.globalAlpha=l.alpha;
    // Tiny visual offset upward per layer (max 2px) for depth feel only
    const visualOffset = i * 1.5;
    drawFutonFlat(ctx, l.x, l.y - visualOffset, l.width, l.height, l.layerDef);
    ctx.restore();
  });

  // Falling futon (full opacity)
  if (gamePhase!=='result') {
    ctx.save();
    const cx=futon.x+futon.width/2, cy=futon.y+futon.height/2;
    ctx.translate(cx,cy); ctx.rotate(futon.angle);
    drawFutonFlat(ctx,-futon.width/2,-futon.height/2,futon.width,futon.height,LAYERS[currentLayerIdx]);
    ctx.restore();
  }

  // Futon name label during sliding
  if (gamePhase==='sliding') {
    const layer = LAYERS[currentLayerIdx];
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.font='bold 13px Zen Maru Gothic, sans-serif';
    ctx.textAlign='center';
    ctx.fillText(layer.name, futon.x + futon.width/2, futon.y - 8);
    ctx.textAlign='left';
    ctx.restore();
  }
  // Target guide - dashed rectangle showing ideal landing zone
  if (gamePhase==='sliding' || gamePhase==='falling') {
    const landY = state.mode==='endless' ? getLandingY(H) : bedTop;
    const guideY = landY - futon.height - 2;
    ctx.save();
    ctx.strokeStyle='rgba(255,255,100,.30)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
    ctx.strokeRect(pb.feetX, guideY, pb.bodyW * 0.82, futon.height + 2);
    ctx.setLineDash([]);ctx.restore();
  }
}

function drawFutonFlat(ctx,x,y,w,h,layerDef) {
  const v = layerDef.visual;

  if (v === 'towel') {
    // タオルケット: thin, flat stripes
    rr(ctx,x,y,w,h,h*.3,layerDef.color);
    // Horizontal stripes
    ctx.strokeStyle=layerDef.pattern; ctx.lineWidth=1.2;
    const stripes = 4;
    for(let i=1;i<stripes;i++){
      const sy = y + h*i/stripes;
      ctx.beginPath();ctx.moveTo(x+w*.04,sy);ctx.lineTo(x+w*.96,sy);ctx.stroke();
    }
    // Thin fringe hint on edges
    ctx.strokeStyle=layerDef.shadow; ctx.lineWidth=1.5;
    rr(ctx,x,y,w,h,h*.3,null,true);
    // Highlight
    rr(ctx,x+w*.05,y+h*.08,w*.9,h*.3,h*.15,'rgba(255,255,255,.3)');

  } else if (v === 'blanket') {
    // 毛布: fluffy, wavy edge suggestion
    rr(ctx,x,y,w,h,h*.4,layerDef.color);
    // Wavy top/bottom border to suggest fluffiness
    ctx.strokeStyle=layerDef.pattern; ctx.lineWidth=2;
    const steps=16;
    ctx.beginPath();
    for(let i=0;i<=steps;i++){
      const t=i/steps;
      const px=x+w*t;
      const py=y+h*.25+Math.sin(t*Math.PI*4)*h*.08;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.beginPath();
    for(let i=0;i<=steps;i++){
      const t=i/steps;
      const px=x+w*t;
      const py=y+h*.75+Math.sin(t*Math.PI*4+1)*h*.08;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();
    // Fuzzy dots suggestion
    ctx.fillStyle=layerDef.pattern;
    [[.2,.5],[.5,.4],[.8,.55],[.35,.6],[.65,.42]].forEach(([tx,ty])=>{
      ctx.beginPath();ctx.arc(x+w*tx,y+h*ty,h*.07,0,Math.PI*2);ctx.fill();
    });
    ctx.strokeStyle=layerDef.shadow; ctx.lineWidth=2;
    rr(ctx,x,y,w,h,h*.4,null,true);
    rr(ctx,x+w*.05,y+h*.08,w*.9,h*.25,h*.15,'rgba(255,255,255,.2)');

  } else {
    // 掛け布団: thick, quilted grid pattern
    rr(ctx,x,y,w,h,h*.35,layerDef.color);
    // Quilt grid
    ctx.strokeStyle=layerDef.pattern; ctx.lineWidth=1.5;
    const cols=3, rows=2;
    for(let c=1;c<cols;c++){
      ctx.beginPath();ctx.moveTo(x+w*c/cols,y+h*.1);ctx.lineTo(x+w*c/cols,y+h*.9);ctx.stroke();
    }
    for(let r=1;r<rows;r++){
      ctx.beginPath();ctx.moveTo(x+w*.05,y+h*r/rows);ctx.lineTo(x+w*.95,y+h*r/rows);ctx.stroke();
    }
    // Quilt puff dots at intersections
    ctx.fillStyle='rgba(255,255,255,.35)';
    for(let c=1;c<cols;c++){
      for(let r=1;r<rows;r++){
        ctx.beginPath();ctx.arc(x+w*c/cols,y+h*r/rows,h*.1,0,Math.PI*2);ctx.fill();
      }
    }
    // Thick border
    ctx.strokeStyle=layerDef.shadow; ctx.lineWidth=2.5;
    rr(ctx,x,y,w,h,h*.35,null,true);
    // Bold highlight (shows thickness)
    rr(ctx,x+w*.04,y+h*.06,w*.92,h*.32,h*.18,'rgba(255,255,255,.28)');
  }
}

function drawPerson(ctx,W,H,stg,pb,bedTop,bedH) {
  const sc=stg.scale;
  const bodyY=bedTop+bedH*.17;
  const bodyH2=bedH*.28;
  const isWaking=(gamePhase==='facehit')&&state.mode==='endless';
  if(stg.char==='cat'){ drawCat(ctx,W,pb,bodyY,bodyH2,sc,stg,isWaking); return; }
  drawHuman(ctx,W,pb,bodyY,bodyH2,sc,stg,isWaking);
}

function drawCat(ctx,W,pb,bodyY,bodyH2,sc,stg,isWaking) {
  const hr=W*.065*sc;
  const hx=pb.headX-hr*.4;
  const hy=bodyY+bodyH2*.42;

  // Body - round curled
  ctx.fillStyle=stg.personColor;
  ctx.beginPath();
  ctx.ellipse(pb.bodyX+pb.bodyW*.42,bodyY+bodyH2*.6,pb.bodyW*.34,bodyH2*.3,-.1,0,Math.PI*2);
  ctx.fill();

  // Tabby stripes on body
  ctx.save(); ctx.globalAlpha=.3; ctx.strokeStyle=stg.hairColor; ctx.lineWidth=hr*.2; ctx.lineCap='round';
  const bx=pb.bodyX+pb.bodyW*.2, by=bodyY+bodyH2*.38;
  [[bx,by,bx+W*.01,by+bodyH2*.45],[bx+W*.06,by-bodyH2*.05,bx+W*.065,by+bodyH2*.42],[bx+W*.12,by,bx+W*.12,by+bodyH2*.4]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  ctx.restore();

  // Tail - big curled
  ctx.strokeStyle=stg.personColor; ctx.lineWidth=hr*.55; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(pb.feetX+W*.015, bodyY+bodyH2*.55);
  ctx.bezierCurveTo(pb.feetX-W*.09,bodyY+bodyH2*.85,pb.feetX-W*.05,bodyY+bodyH2*1.2,pb.feetX+W*.06,bodyY+bodyH2*1.05);
  ctx.stroke();
  ctx.save(); ctx.globalAlpha=.4; ctx.strokeStyle=stg.hairColor; ctx.lineWidth=hr*.25;
  ctx.beginPath();
  ctx.moveTo(pb.feetX,bodyY+bodyH2*.72);
  ctx.bezierCurveTo(pb.feetX-W*.05,bodyY+bodyH2*.95,pb.feetX,bodyY+bodyH2*1.15,pb.feetX+W*.05,bodyY+bodyH2*1.05);
  ctx.stroke(); ctx.restore();

  // Head
  ctx.fillStyle=stg.personColor;
  ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.fill();

  // Forehead M stripes
  ctx.save(); ctx.globalAlpha=.4; ctx.strokeStyle=stg.hairColor; ctx.lineWidth=hr*.15; ctx.lineCap='round';
  [[hx-hr*.4,hy-hr*.55,hx-hr*.25,hy-hr*.05],[hx,hy-hr*.65,hx,hy-hr*.1],[hx+hr*.4,hy-hr*.55,hx+hr*.25,hy-hr*.05]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  ctx.restore();

  // EARS - very large and pointed
  [[hx-hr*.85,hy-hr*.35,hx-hr*.5,hy-hr*1.7,hx-hr*.05,hy-hr*.5],
   [hx+hr*.05,hy-hr*.55,hx+hr*.55,hy-hr*1.7,hx+hr*.9,hy-hr*.3]].forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.fillStyle=stg.personColor;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();ctx.fill();
  });
  // Inner ear pink
  [[hx-hr*.72,hy-hr*.42,hx-hr*.5,hy-hr*1.3,hx-hr*.12,hy-hr*.56],
   [hx+hr*.12,hy-hr*.6,hx+hr*.52,hy-hr*1.3,hx+hr*.76,hy-hr*.36]].forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.fillStyle='#ffaacc';
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();ctx.fill();
  });

  // Whiskers - long white
  ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.lineWidth=1.3; ctx.lineCap='round';
  [[-hr*.15,hy-hr*.05,-hr*1.9,hy-hr*.15],[-hr*.1,hy+hr*.15,-hr*1.8,hy+hr*.15],[-hr*.15,hy+hr*.35,-hr*1.7,hy+hr*.38]].forEach(([dx1,y1,dx2,y2])=>{
    ctx.beginPath();ctx.moveTo(hx+dx1,y1);ctx.lineTo(hx+dx2,y2);ctx.stroke();
  });
  [[hr*.1,hy-hr*.05,hr*1.85,hy-hr*.15],[hr*.1,hy+hr*.15,hr*1.75,hy+hr*.15],[hr*.1,hy+hr*.35,hr*1.65,hy+hr*.38]].forEach(([dx1,y1,dx2,y2])=>{
    ctx.beginPath();ctx.moveTo(hx+dx1,y1);ctx.lineTo(hx+dx2,y2);ctx.stroke();
  });

  if(isWaking) {
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(hx-hr*.3,hy+hr*.08,hr*.28,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+hr*.3,hy+hr*.08,hr*.28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(hx-hr*.3,hy+hr*.08,hr*.16,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+hr*.3,hy+hr*.08,hr*.16,0,Math.PI*2);ctx.fill();
    drawSurprise(ctx,hx,hy,hr);
  } else {
    ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(hx-hr*.3,hy+hr*.08,hr*.2,.1*Math.PI,.9*Math.PI);ctx.stroke();
    ctx.beginPath();ctx.arc(hx+hr*.3,hy+hr*.08,hr*.2,.1*Math.PI,.9*Math.PI);ctx.stroke();
    ctx.fillStyle='#ffaacc';
    ctx.beginPath();ctx.moveTo(hx,hy+hr*.35);ctx.lineTo(hx-hr*.1,hy+hr*.5);ctx.lineTo(hx+hr*.1,hy+hr*.5);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(210,215,255,.8)';
    ctx.font='bold '+Math.round(hr*.58)+'px sans-serif';ctx.fillText('z',hx+hr*1.2,hy-hr*.15);
    ctx.font='bold '+Math.round(hr*.42)+'px sans-serif';ctx.fillText('z',hx+hr*1.55,hy-hr*.65);
  }
}

function drawHuman(ctx,W,pb,bodyY,bodyH2,sc,stg,isWaking) {
  const hr=W*.055*sc;
  const ey=bodyY+bodyH2*.36;
  rr(ctx,pb.bodyX,bodyY,pb.bodyW*.70,bodyH2,8,stg.personColor);
  rr(ctx,pb.feetX,bodyY+bodyH2*.22,pb.bodyW*.16,bodyH2*.58,6,stg.personColor);
  ctx.fillStyle=stg.personColor;ctx.beginPath();ctx.arc(pb.headX,bodyY+bodyH2*.38,hr,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=stg.hairColor;
  if(stg.char==='baby'){
    ctx.beginPath();ctx.arc(pb.headX,bodyY+bodyH2*.26,hr*.6,Math.PI,0);ctx.fill();
    ctx.strokeStyle=stg.hairColor;ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(pb.headX,bodyY+bodyH2*.18);ctx.quadraticCurveTo(pb.headX+hr*.7,bodyY+bodyH2*.02,pb.headX+hr*.4,bodyY-hr*.25);ctx.stroke();
  } else if(stg.char==='child'){
    ctx.beginPath();ctx.arc(pb.headX,bodyY+bodyH2*.26,hr*.85,Math.PI,.05*Math.PI);ctx.fill();
  } else {
    ctx.beginPath();ctx.arc(pb.headX,bodyY+bodyH2*.28,hr*.82,Math.PI,.1*Math.PI);ctx.fill();
  }
  ctx.strokeStyle='#4a3728';ctx.lineWidth=1.5;
  if(isWaking){
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(pb.headX-hr*.30,ey,hr*.23,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(pb.headX+hr*.24,ey,hr*.23,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a1a0a';
    ctx.beginPath();ctx.arc(pb.headX-hr*.30,ey,hr*.13,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(pb.headX+hr*.24,ey,hr*.13,0,Math.PI*2);ctx.fill();
    drawSurprise(ctx,pb.headX,bodyY,hr);
  } else {
    ctx.beginPath();ctx.arc(pb.headX-hr*.30,ey,hr*.17,.1*Math.PI,.9*Math.PI);ctx.stroke();
    ctx.beginPath();ctx.arc(pb.headX+hr*.24,ey,hr*.17,.1*Math.PI,.9*Math.PI);ctx.stroke();
    ctx.fillStyle='rgba(200,200,255,.65)';
    ctx.font='bold '+Math.round(hr*.6)+'px sans-serif';ctx.fillText('z',pb.headX+hr*.9,bodyY);
    ctx.font='bold '+Math.round(hr*.45)+'px sans-serif';ctx.fillText('z',pb.headX+hr*1.2,bodyY-hr*.5);
  }
}

function drawSurprise(ctx,hx,hy,hr) {
  ctx.strokeStyle='rgba(255,210,0,.8)';ctx.lineWidth=2;
  [-0.8,-0.3,0.25,0.8,-1.3].forEach(a=>{
    ctx.beginPath();
    ctx.moveTo(hx+Math.cos(a)*hr*1.25,hy+Math.sin(a)*hr*1.25);
    ctx.lineTo(hx+Math.cos(a)*hr*2.1, hy+Math.sin(a)*hr*2.1);
    ctx.stroke();
  });
  const p=Math.min(1,faceHitTimer/15);
  ctx.save();ctx.globalAlpha=p;
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(hx+hr*1.9,hy-hr,hr*.6,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ddd';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#e02020';ctx.font='bold '+Math.round(hr*.75)+'px sans-serif';
  ctx.textAlign='center';ctx.fillText('！',hx+hr*1.9,hy-hr+hr*.28);ctx.textAlign='left';
  ctx.restore();
}

function rr(ctx,x,y,w,h,r,fill,stroke) {
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke)ctx.stroke();
}
function tri(ctx,x,y,size,color) {
  ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x,y-size);
  ctx.lineTo(x-size*.6,y+size*.2);ctx.lineTo(x+size*.6,y+size*.2);ctx.closePath();ctx.fill();
}
function spawnSparkle() {
  const el=document.createElement('div');el.className='sparkle';
  el.textContent=['⭐','✨','🌟','💫'][Math.floor(Math.random()*4)];
  el.style.left=Math.random()*80+10+'%';el.style.top=Math.random()*60+20+'%';
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}

function nextStage() {
  document.getElementById('result-overlay').classList.remove('active');
  if (state.mode==='endless') {
    currentStageData=STAGES[Math.floor(Math.random()*STAGES.length)];
    currentLayerIdx=0; landedLayers=[]; layerScores=[];
    dotPrefix='e'; updateDots(); updateLayerLabel();
    initGame('gameCanvasEndless','game-area-endless');
    return;
  }
  if (state.currentStage>=STAGES.length-1) {
    state.allCleared=true;localStorage.setItem('all_cleared','1');showFinalScreen();
  } else {
    state.currentStage++;
    if (state.currentStage+1>state.unlockedStages) {
      state.unlockedStages=state.currentStage+1;localStorage.setItem('unlocked',state.unlockedStages);
    }
    currentStageData=STAGES[state.currentStage];
    currentLayerIdx=0; landedLayers=[]; layerScores=[];
    dotPrefix=''; updateDots(); updateLayerLabel();
    document.getElementById('game-stage-label').textContent=`STAGE ${state.currentStage+1}`;
    initGame('gameCanvas','game-area');
  }
}

function retryStage() {
  document.getElementById('result-overlay').classList.remove('active');
  if (state.mode==='endless') {
    // Full reset for endless
    startEndless();
    return;
  }
  currentLayerIdx=0; landedLayers=[]; layerScores=[];
  updateDots(); updateLayerLabel();
  initGame('gameCanvas','game-area');
}

function showFinalScreen() {
  const total=state.scores.reduce((a,b)=>a+(b||0),0);
  document.getElementById('final-total').textContent=total;
  const el=document.getElementById('final-stages');el.innerHTML='';
  STAGES.forEach((s,i)=>{
    const d=document.createElement('div');d.className='fss';
    d.innerHTML=`<div class="fss-icon">${s.icon}</div><div class="fss-score">${state.scores[i]||0}</div><div class="fss-name">${s.name}</div>`;
    el.appendChild(d);
  });
  showScreen('screen-final');
}

function startEndless() {
  if(animFrame) cancelAnimationFrame(animFrame);
  state.mode='endless'; state.endlessScore=0;
  endlessCount=0; endlessStackHeight=0;
  currentLayerIdx=0; landedLayers=[]; layerScores=[];
  currentStageData = Object.assign({}, STAGES[Math.floor(Math.random()*STAGES.length)]);
  dotPrefix='e';
  showScreen('screen-endless');
  const cd=document.getElementById('endless-count-display');
  if(cd) cd.textContent='0枚';
  const ll=document.getElementById('elayer-label');
  if(ll) ll.textContent='';
  initGame('gameCanvasEndless','game-area-endless');
}

function confirmBack() {
  if(animFrame)cancelAnimationFrame(animFrame);
  document.getElementById('result-overlay').classList.remove('active');
  showScreen('screen-stages');
}
function resetGame() {
  state.scores=[null,null,null,null];state.currentStage=0;state.unlockedStages=1;
  localStorage.removeItem('unlocked');showScreen('screen-stages');
}

window.addEventListener('resize',()=>{
  const a=document.querySelector('.screen.active');
  if(a&&(a.id==='screen-game'||a.id==='screen-endless')){
    const cid=a.id==='screen-game'?'gameCanvas':'gameCanvasEndless';
    const aid=a.id==='screen-game'?'game-area':'game-area-endless';
    initGame(cid,aid);
  }
});
</script>
</body>
</html>
